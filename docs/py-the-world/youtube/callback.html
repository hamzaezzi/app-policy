<!DOCTYPE html>
<html>
<head>
  <title>Youtube OAuth Callback</title>
</head>
<body>
  <h1>Authorization complete</h1>
  <p>You can close this page.</p>

    console.log("Authorization code:", code);
  </script>
</body>
</html>
